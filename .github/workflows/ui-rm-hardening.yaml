# This workflow calls the master E2E workflow with custom variables
name: UI-rm-hardening-tests
run-name: ${{ github.event_name == 'workflow_dispatch' && format('`{0}` on `{1}` - `{2}` destroy={3}{4}', inputs.rancher_version, inputs.upstream_cluster_version, inputs.grep_test_by_tag, inputs.destroy_runner, contains(inputs.runner_template, 'dedicated') && ' (runner=dedicated)' || '') || github.workflow }}

on:
  workflow_dispatch:
    inputs:
      qase_report:
        description: Report to QASE
        default: true
        type: boolean
      qase_run_id:
        description: Existing QASE run ID (leave empty to create a new one)
        required: false
        type: string
        default: ''
      qase_complete_run:
        description: "`Uncheck` when appending test runs. `Check` on final run to close QASE. For daily runs, keep it checked."
        default: true
        type: boolean
      runner_template:
        description: Runner template to use (spot or dedicated)
        default: fleet-e2e-ci-runner-spot-x86-64-template-v3
        type: choice
        options:
          - fleet-e2e-ci-runner-spot-x86-64-template-v3
          - fleet-e2e-ci-runner-spot-x86-64-template-v3-dedicated
      destroy_runner:
        description: Destroy the auto-generated self-hosted runner
        default: true
        type: boolean
      rancher_version:
        description: Rancher version channel/version/head_version latest/latest, latest/2.11.x[-rc1], prime/2.11.x, prime/devel/2.11, alpha/2.11.0-alpha1
        default: head/2.12
        type: string
        required: true
      upstream_cluster_version:
        description: Cluster version where to install Rancher (here for Downstream clusters)
        default: 'v1.32.4+k3s1'
        type: string
        required: true
      hardening:
        description: Select if desired hardened cluster (if 'true' use only @login @hardening-tests)
        required: false
        type: boolean
        default: true
      hardening_cluster_version:
        description: 'RKE2 version for hardened upstream cluster (Rancher 2.11 requires K8s < 1.33, use v1.32.8+rke2r1)'
        default: 'v1.33.0+rke2r1'
        type: choice
        options:
          - 'v1.33.0+rke2r1'
          - 'v1.32.8+rke2r1'
      grep_test_by_tag:
        description: Grep tags. For hardened tests, use @hardening-tests Keep always @login
        required: false
        type: string
        default: '@login @hardening-tests'

jobs:
  ui:
    uses: ./.github/workflows/master-e2e.yaml
    secrets:
      credentials: ${{ secrets.GCP_CREDENTIALS }}
      pat_token: ${{ secrets.SELF_HOSTED_RUNNER_PAT_TOKEN }}
      rancher_password: ${{ secrets.RANCHER_PASSWORD }}
      gitlab_private_user: ${{ secrets.GITLAB_PRIVATE_USER }}
      gitlab_private_pwd: ${{ secrets.GITLAB_PRIVATE_PWD }}
      bitbucket_private_user: ${{ secrets.BITBUCKET_PRIVATE_USER }}
      bitbucket_private_pwd: ${{ secrets.BITBUCKET_PRIVATE_PWD }}
      gh_private_user: ${{ secrets.GH_PRIVATE_USER }}
      gh_private_pwd: ${{ secrets.GH_PRIVATE_PWD }}
      azure_private_user: ${{ secrets.AZURE_PRIVATE_USER }}
      azure_private_pwd: ${{ secrets.AZURE_PRIVATE_PWD }}
      rsa_private_key_qa: ${{ secrets.RSA_PRIVATE_KEY_QA }}
      rsa_public_key_qa: ${{ secrets.RSA_PUBLIC_KEY_QA }}
      qase_api_token: ${{ secrets.QASE_API_TOKEN }}
    with:
      test_description: "CI/Manual - UI - Deployment test with hardened rke2 cluster"
      cluster_name: hardened-rke2-cluster
      # WARNING, VALUES BELOW ARE HARDCODED FOR RUNS SCHEDULED BY CRON
      destroy_runner: ${{ inputs.destroy_runner }}
      upstream_cluster_version: ${{ inputs.upstream_cluster_version }}
      rancher_version: ${{ inputs.rancher_version }}
      qase_report: ${{ inputs.qase_report == true || (github.event_name == 'schedule' && true) }}
      qase_run_id: ${{ inputs.qase_run_id || '' }}
      qase_complete_run: ${{ inputs.qase_complete_run != false }}
      grep_test_by_tag: ${{ inputs.grep_test_by_tag }}
      hardening: ${{ inputs.hardening }}
      hardening_cluster_version: ${{ inputs.hardening_cluster_version }}
      runner_template: ${{ inputs.runner_template || 'fleet-e2e-ci-runner-spot-x86-64-template-v3' }}
